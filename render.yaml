# Render Blueprint — deploys the whole app as one Docker web service.
# In Render: New → Blueprint → pick this repo. It reads this file, then prompts
# for the secrets marked `sync: false`. See DEPLOYMENT.md for the click-by-click.
services:
  - type: web
    name: expense-intelligence
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Neon Postgres connection string — paste in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      # Strong signing secret — Render generates one for you.
      - key: JWT_SECRET_KEY
        generateValue: true
      # HTTPS + same-origin cookies in production.
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax
      # Weekly digest email via Brevo's HTTP API (Render blocks outbound SMTP,
      # so the API over HTTPS is required in production). Enter the key — which
      # starts with "xkeysib-" — in the dashboard; never commit it.
      - key: BREVO_API_KEY
        sync: false
      - key: DIGEST_FROM
        value: expenseintelligence@gmail.com
      - key: DIGEST_TO
        value: expenseintelligence@gmail.com
